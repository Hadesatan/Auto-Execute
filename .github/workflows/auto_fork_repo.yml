name: Daily Fork Sync Upstream
run-name: 每日上游仓库 Fork 更新检测
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  MY_USER: Hadesatan  # 替换为你的GitHub用户名
  UPSTREAM_FILE: ./upstreams.txt

# 操作仓库、删除fork必须开启写入权限
permissions:
  contents: write

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取当前仓库配置
        uses: actions/checkout@v4

      - name: 安装 gh 命令行工具
        run: |
          sudo apt update
          sudo apt install gh -y
          # 使用token静默登录，避免网页验证超时报错
          gh auth login --with-token $GH_TOKEN

      - name: 遍历所有上游仓库执行同步逻辑
        run: |
          while IFS= read -r upstream; do
            [[ -z "$upstream" ]] && continue
            echo "==================== 处理上游仓库: $upstream ===================="
            
            UP_OWNER=$(echo "$upstream" | cut -d'/' -f1)
            UP_REPO=$(echo "$upstream" | cut -d'/' -f2)
            LOCAL_REPO="$MY_USER/$UP_REPO"

            if gh repo view "$LOCAL_REPO" >/dev/null 2>&1; then
              echo "本地仓库 $LOCAL_REPO 已存在，对比上游更新"
              # 已修改为 master 分支
              UP_LATEST=$(gh api repos/$upstream/commits/master -q .sha)
              LOCAL_LATEST=$(gh api repos/$LOCAL_REPO/commits/master -q .sha 2>/dev/null || echo "null")

              echo "上游最新commit: $UP_LATEST"
              echo "本地fork最新commit: $LOCAL_LATEST"

              if [[ "$UP_LATEST" != "$LOCAL_LATEST" ]]; then
                echo "检测到更新，删除旧仓库重新Fork"
                gh repo delete "$LOCAL_REPO" --yes
                gh repo fork "$upstream" --clone=false
              else
                echo "上游无更新，跳过"
              fi
            else
              echo "本地无仓库，首次Fork创建"
              gh repo fork "$upstream" --clone=false
            fi
          done < "$UPSTREAM_FILE"
