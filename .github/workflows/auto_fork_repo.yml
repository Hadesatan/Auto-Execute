name: Rename -> Fork -> Delete Old Repo
on:
  schedule:
    # UTC 0点 = 北京时间 8点，自行调整 cron
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动立即执行

jobs:
  task:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}  # ========= 此处务必修改为你自己的信息 =========
      # UPSTREAM_REPO: LiBwrt/LibWrt
      MY_USER: Hadesatan
    steps:
      - name: 获取北京时间日期
        run: |
          # 北京时间 年月日 格式: 20260614
          TODAY=$(TZ='Asia/Shanghai' date +%Y%m%d)
          echo "TODAY=$TODAY" >> $GITHUB_ENV

      - name: 提取仓库名
        run: |
          UPSTREAM_LIST=(
            "LiBwrt/LibWrt"
            "immortalwrt/immortalwrt"
            "immortalwrt/packages"
            "immortalwrt/luci"
          )
          for UPSTREAM_REPO in "${UPSTREAM_LIST[@]}"; do # 截取上游仓库名
            BASE_REPO=$(echo $UPSTREAM_REPO | cut -d/ -f2)
            echo "BASE_REPO=$BASE_REPO" >> $GITHUB_ENV

            # 旧仓库重命名后的名称
            OLD_REPO="${BASE_REPO}_${TODAY}"
            echo "OLD_REPO=$OLD_REPO" >> $GITHUB_ENV

            # 检测同名仓库是否存在
            RESP_CODE=$(curl --write-out "%{http_code}" --silent --output /dev/null \
            "https://api.github.com/repos/$MY_USER/$BASE_REPO/contents")
            echo "API response code: $RESP_CODE"
            sleep 5
      
            if [ $RESP_CODE -eq 200 ]; then
              echo "发现旧仓库 $BASE_REPO，开始重命名为 $OLD_REPO"
              # 调用API重命名仓库
              curl -X PATCH \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/$MY_USER/$BASE_REPO \
                -d "{\"name\":\"$OLD_REPO\"}"
              sleep 5
            else
              echo "仓库 $BASE_REPO 不存在，跳过重命名"
            fi

            echo "开始 Fork 上游仓库: $UPSTREAM_REPO"
            curl -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/$UPSTREAM_REPO/forks
            sleep 5
            
            echo "准备删除旧仓库: $OLD_REPO"
            curl -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/$MY_USER/$OLD_REPO
            sleep 5
          done
