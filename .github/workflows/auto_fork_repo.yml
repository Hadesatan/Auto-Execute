name: Sync Upstream Repositories

on:
  # 每天 UTC 00:00 执行（北京时间 08:00）
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    # 定义多个上游仓库
    strategy:
      fail-fast: false
      matrix:
        upstream:
          # 格式: "owner/repo"
          - "Libwrt/LiBwrt"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || sudo apt update && sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Sync Upstream Repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          UPSTREAM: ${{ matrix.upstream }}
          # 当前 GitHub 用户名/组织名，根据实际情况修改
          TARGET_OWNER: "Hadesatan"
        run: |
          set -e

          echo "=== Processing upstream: $UPSTREAM ==="
          REPO_NAME="${UPSTREAM#*/}"
          TARGET_REPO="$TARGET_OWNER/$REPO_NAME"

          # 1. 检查本地是否存在同名仓库
          if gh repo view "$TARGET_REPO" &>/dev/null; then
            echo "Repository $TARGET_REPO already exists."
            EXISTS=true
          else
            echo "Repository $TARGET_REPO does not exist. Creating fork..."
            EXISTS=false
          fi

          # 2. 如果不存在，直接 fork
          if [ "$EXISTS" = false ]; then
            echo "First-time creation: forking $UPSTREAM -> $TARGET_REPO"
            gh repo fork "$UPSTREAM" --clone=false --remote=false
            echo "✅ Fork created successfully."
            exit 0
          fi

          # 3. 如果存在，检查是否有更新
          echo "Checking for updates in $UPSTREAM ..."

          # 获取上游最新 commit hash（使用 GitHub API 更可靠）
          UPSTREAM_SHA=$(gh api repos/$UPSTREAM/commits/main --jq '.sha' 2>/dev/null || gh api repos/$UPSTREAM/commits/master --jq '.sha')
          TARGET_SHA=$(gh api repos/$TARGET_REPO/commits/main --jq '.sha' 2>/dev/null || gh api repos/$TARGET_REPO/commits/master --jq '.sha')

          echo "Upstream SHA: $UPSTREAM_SHA"
          echo "Target SHA:   $TARGET_SHA"

          if [ "$UPSTREAM_SHA" = "$TARGET_SHA" ]; then
            echo "✅ No new updates. Skipping."
            exit 0
          fi

          # 4. 有更新：删除旧仓库，重新 fork
          echo "🔄 Updates detected! Recreating fork..."

          # 删除旧仓库（需要 administration:write 权限）
          echo "Deleting old repository: $TARGET_REPO"
          gh repo delete "$TARGET_REPO" --yes

          # 等待删除完成（GitHub 可能需要几秒处理）
          sleep 5

          # 重新 fork
          echo "Creating fresh fork: $UPSTREAM -> $TARGET_REPO"
          gh repo fork "$UPSTREAM" --clone=false --remote=false

          echo "✅ Fresh fork created successfully."
