name: 每日批量Fork，重命名旧库并删除所有归档仓库
on:
  schedule:
    - cron: '50 23 * * *' # UTC 0点 = 北京时间早上8点执行
  workflow_dispatch # 支持手动一键运行

jobs:
  fork_task:
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      MY_GITHUB_USER: Hadesatan # 修改此处
    steps:
      - name: 获取北京时间日期 YYYYMMDD
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y%m%d)
          echo "TODAY=$TODAY" >> $GITHUB_ENV

      - name: 循环处理所有上游仓库
        run: |
          # 在这里填写所有需要fork的仓库，格式 "作者/仓库名"
          UPSTREAM_LIST=(
            "LiBwrt/LibWrt"
            "immortalwrt/immortalwrt"
          )

          for UP in "${UPSTREAM_LIST[@]}"; do
            echo "==================== 开始处理 $UP ===================="
            # 截取仓库名（/后面部分）
            REPO_NAME=$(echo $UP | cut -d/ -f2)
            ARCHIVE_NAME="${REPO_NAME}_${TODAY}"

            # 1. 判断当前同名仓库是否存在，存在则重命名
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_PAT" \
              https://api.github.com/repos/$MY_GITHUB_USER/$REPO_NAME)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "仓库 $REPO_NAME 存在，重命名为 $ARCHIVE_NAME"
              curl -X PATCH \
                -H "Authorization: token $GH_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/$MY_GITHUB_USER/$REPO_NAME \
                -d "{\"name\":\"$ARCHIVE_NAME\"}"
              sleep 5
            else
              echo "仓库 $REPO_NAME 不存在，跳过重命名"
            fi

            # 2. 全新Fork上游仓库
            echo "执行Fork：$UP"
            curl -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/$UP/forks
            sleep 5

            # 3. 删除归档旧仓库
             echo "删除归档旧仓库：$ARCHIVE_NAME"
            curl -X DELETE \
                -H "Authorization: token $GH_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/$MY_GITHUB_USER/$ARCHIVE_NAME
              sleep 5
          done
